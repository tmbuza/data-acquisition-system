project:
  type: book
  output-dir: docs

bibliography: library/references.bib
date: last-modified
date-format: "MMM YYYY"

book:
  title: "CDI Data Acquisition System"
  subtitle: "From Public Omics Data Discovery to Reproducible Reference Datasets"
  chapters:
    - index.qmd
    - part: "Foundations"
      chapters:
        - 00-preface-and-overview.qmd
        - 01-public-data-landscape.qmd
        - 02-study-discovery.qmd
        - 03-accession-systems.qmd

    - part: "Acquisition Systems"
      chapters:
        - 04-metadata-acquisition.qmd
        - 05-data-download-system.qmd
        - 06-data-validation-system.qmd
        - 07-cloud-storage-and-transfer-system.qmd
        - 08-reference-dataset-assembly-system.qmd

    - part: "Case Study"
      chapters:
        - 09-end-to-end-case-study.qmd

  appendices:
    - 999-appendix.qmd
    - 999-references.qmd

format:
  html:
    toc: true
    toc-depth: 3
    number-sections: false
    number-depth: 2
    smooth-scroll: true
    anchor-sections: true
    link-external-icon: true
    css: assets/css/cdi.css
    code-fold: true
    mermaid:
      theme: forest

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
  working-dir: .
